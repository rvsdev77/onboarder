version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: onboarder-postgres
    environment:
      POSTGRES_DB: onboarder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: onboarder-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/onboarder
      SPRING_AI_OPENAI_API_KEY: ${SPRING_AI_OPENAI_API_KEY}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./ui
    container_name: onboarder-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
